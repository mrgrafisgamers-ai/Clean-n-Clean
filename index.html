<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pengaduan Layanan Cuci Kendaraan</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --bg-color: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
        }

        h2 {
            color: var(--primary-color);
            text-align: center;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box; 
        }

        textarea {
            resize: vertical;
            height: 100px;
        }

        .readonly-field {
            background-color: #e9ecef;
            cursor: not-allowed;
        }

        button {
            width: 100%;
            padding: 15px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #2980b9;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Form Keluhan Pelanggan</h2>
    <form id="complaintForm">
        <div class="form-group">
            <label>Tanggal Pengaduan</label>
            <input type="text" id="autoDate" name="tanggal" class="readonly-field" readonly>
        </div>

        <div class="form-group">
            <label>Nama Pelanggan/PIC Kendaraan</label>
            <input type="text" name="nama" placeholder="Masukkan nama Anda" required>
        </div>

        <div class="form-group">
            <label>Nomor Polisi</label>
            <input type="text" name="nopol" placeholder="Contoh: D 1234 ABC" required>
        </div>

        <div class="form-group">
            <label>Jenis Layanan</label>
            <select name="layanan">
                <option value="Cuci Body">Cuci Body</option>
            </select>
        </div>

        <div class="form-group">
            <label>Detail Keluhan</label>
            <textarea name="keluhan" placeholder="Ceritakan keluhan Anda secara detail...(jadwal cuci biasanya rabu malam dan hari minggu pagi)" required></textarea>
        </div>

        <button type="submit">Kirim Pengaduan via WhatsApp</button>
    </form>
</div>

<script>
    // Mengisi tanggal otomatis saat halaman dimuat
    const now = new Date();
    const options = { year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' };
    document.getElementById('autoDate').value = now.toLocaleDateString('id-ID', options);

    // Handler Kirim ke WhatsApp
    document.getElementById('complaintForm').addEventListener('submit', function(e) {
        e.preventDefault();

        // --- GANTI NOMOR DI BAWAH INI (Gunakan kode negara 62) ---
        const nomorWA = "628123456789"; 
        // -------------------------------------------------------

        const tanggal = document.getElementById('autoDate').value;
        const nama = this.nama.value;
        const nopol = this.nopol.value;
        const layanan = this.layanan.value;
        const keluhan = this.keluhan.value;

        // Menyusun teks pesan
        const pesan = `*PENGADUAN CUCI KENDARAAN*%0A` +
                      `------------------------------%0A` +
                      `*Tanggal:* ${tanggal}%0A` +
                      `*Nama:* ${nama}%0A` +
                      `*Nopol:* ${nopol}%0A` +
                      `*Layanan:* ${layanan}%0A` +
                      `*Keluhan:* ${keluhan}`;

        // Mengarahkan ke WhatsApp
        const url = `https://wa.me/${nomorWA}?text=${pesan}`;
        window.open(url, '_blank');

        // Reset form setelah kirim
        this.reset();
        document.getElementById('autoDate').value = new Date().toLocaleDateString('id-ID', options);
    });
</script>

</body>
</html>
